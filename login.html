<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - RuteKita</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
}

.left-side {
    background: linear-gradient(135deg, #6BB6D9, #4A90E2);
    color: white;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

.right-side {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    width: 360px;
}


.btn-social {
    border-radius: 30px;
    border: 1px solid #ddd;
    margin-bottom: 10px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.form-control {
    border-radius: 10px;
}

.btn-login {
    border-radius: 30px;
    background: #4A90E2;
    color: white;
    font-weight: 600;
}


.small-text {
    font-size: 13px;
}

@media (max-width: 768px) {
    .left-side {
        display: none;
    }
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<div class="col-md-6 left-side">
<div class="d-flex align-items-center justify-content-center">
<img src="download.png" height="250">
<div class="text-start ms-2">
<h4 class="mb-0 fw-bold">RUTEKITA</h4>
<small>Smart Tourism Planner</small>
</div>
</div>
</div>

<div class="col-md-6 right-side">

<div class="login-card">

<h3 class="mb-3">Selamat Datang 👋</h3>

<a href="beranda.html" class="btn btn-light w-100 btn-social">
<img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
Login dengan Google
</a>

<a href="beranda.html" class="btn btn-light w-100 btn-social">
<img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" width="20">
Login dengan Facebook
</a>

<p class="small-text text-center mt-3">atau login dengan email</p>

<form onsubmit="return login()">

<input type="email" id="email" class="form-control mb-2" placeholder="Email">
<input type="password" class="form-control mb-2" placeholder="Password">

<div class="text-end small-text mb-2">
<a href="gantipassword.html">Lupa kata sandi?</a>
</div>

<button type="submit" class="btn btn-login w-100">
Login
</button>

</form>

<p class="mt-3 small-text text-center">
Belum punya akun? 
<a href="register.html">Daftar disini</a>
</p>

</div>

</div>
</div>
</div>

<script>

function login(){

let email = document.getElementById("email").value;

if(email === ""){
    alert("isi email terlebih dahulu seblm melanjutkan login!");
    return false;
}

let nama = email.split("@")[0];

nama = nama.charAt(0).toUpperCase() + nama.slice(1);

localStorage.setItem("namaUser", nama);

window.location.href = "beranda.html";

return false;
}

</script>

</body>
</html>
