<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - RuteKita</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#f3f4f6;
}

.header{
    background:linear-gradient(135deg,#6BB6D9,#4A90E2);
    color:white;
    padding:30px;
    text-align:center;
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
}

.profile-card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-top:-30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.menu-item{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    cursor:pointer;
}

.logout{
    border:2px solid black;
    border-radius:30px;
    padding:12px;
    text-align:center;
    font-weight:600;
    color:red;
    cursor:pointer;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:10px;
    box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}
.nav-item{
    text-decoration:none;
    color:#777;
}
.nav-item.active{
    color:#4A90E2;
    font-weight:600;
}
</style>
</head>

<body>

<div class="header">
<h4>PROFIL</h4>
</div>

<div class="container mt-3 mb-5" style="padding-bottom:100px;">

<!-- PROFILE -->
<div class="profile-card d-flex align-items-center justify-content-between">

<div class="d-flex align-items-center">
<img src="profil.png" width="60" class="me-3">
<div>
<strong id="namaUser"></strong><br>
<small>💛 VIP Member RUTEKITA</small>
</div>
</div>

<div class="d-flex gap-2">
<button class="btn btn-light">Edit Profil</button>
<button class="btn btn-warning">VIP RUTEKITA</button>
</div>

</div>

<h6 class="mt-3">Akun Saya</h6>

<div class="menu-item" onclick="window.location.href='gantipassword.html'">
<div><i class="bi bi-key me-2"></i>Ganti Kata Sandi</div>
<i class="bi bi-chevron-right"></i>
</div>

<div class="menu-item">
<div><i class="bi bi-credit-card me-2"></i>Pembayaran</div>
<i class="bi bi-chevron-right"></i>
</div>

<div class="menu-item">
<div><i class="bi bi-heart me-2"></i>Favorite saya</div>
<i class="bi bi-chevron-right"></i>
</div>

<h6 class="mt-3">Bantuan</h6>

<div class="menu-item">
<div><i class="bi bi-question-square me-2"></i>Pusat Bantuan</div>
<i class="bi bi-chevron-right"></i>
</div>

<div class="menu-item">
<div><i class="bi bi-shield-lock me-2"></i>Kebijakan Privasi</div>
<i class="bi bi-chevron-right"></i>
</div>

<div class="menu-item">
<div><i class="bi bi-headset me-2"></i>Customer Service</div>
<i class="bi bi-chevron-right"></i>
</div>

<div class="menu-item" onclick="window.location.href='tentng.html'">
<div><i class="bi bi-phone me-2"></i>Tentang Aplikasi</div>
<i class="bi bi-chevron-right"></i>
</div>

<div class="logout mt-3" onclick="logout()">
<i class="bi bi-box-arrow-right"></i> LOG OUT
</div>

</div>

<div class="bottom-nav">
<div class="container d-flex justify-content-around text-center">

<a href="beranda.html" class="nav-item">
<i class="bi bi-house"></i><br>Beranda
</a>

<a href="pesanan.html" class="nav-item">
<i class="bi bi-box"></i><br>Pesanan
</a>

<a href="itinerary.html" class="nav-item">
<i class="bi bi-calendar"></i><br>Itinerary
</a>

<a href="profil.html" class="nav-item active">
<i class="bi bi-person"></i><br>Saya
</a>

</div>
</div>

<script>

let nama = localStorage.getItem("namaUser");

if(!nama){
window.location.href="login.html";
}else{
nama = nama.charAt(0).toUpperCase()+nama.slice(1);
document.getElementById("namaUser").innerText = nama;
}

function logout(){
localStorage.removeItem("namaUser");
window.location.href="login.html";
}

</script>

</body>
</html>
