<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - RuteKita</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
}

.left-side {
    background: linear-gradient(135deg, #6BB6D9, #4A90E2);
    color: white;
    height: 110vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

.left-side h1 {
    font-weight: 600;
}

.right-side {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.register-card {
    width: 380px;
}

.input-group-custom {
    background: #f1f1f1;
    border-radius: 15px;
    padding: 10px 15px;
    display: flex;
    align-items: center;
    margin-bottom: 10px;
}

.input-group-custom img {
    width: 18px;
    margin-right: 10px;
    opacity: 0.6;
}

.input-group-custom input {
    border: none;
    background: transparent;
    outline: none;
    width: 100%;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 20px;
}

.gender-wrapper {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.gender-box {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 15px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
}

.btn-daftar {
    border-radius: 20px;
    padding: 12px;
    width: 100%;
    border: 1px solid black;
    background: white;
    font-weight: 600;
    margin-top: 15px;
}

@media (max-width: 768px) {
    .left-side {
        display: none;
    }
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<div class="col-md-6 left-side">
    <div class="d-flex align-items-center justify-content-center">

    <img src="download.png" height="250">

    <div class="text-start">
        <h4 class="mb-0 fw-bold">RUTEKITA</h4>
        <small>Smart Tourism Planner</small>
    </div>
</div>
</div>

<div class="col-md-6 right-side">

<div class="register-card">

<h4 class="text-center mb-2">Daftar Akun</h4>
<p class="subtitle">Lengkapi Data Dibawah</p>

<form>

<label>Email</label>
<div class="input-group-custom">
    <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
    <input type="email" placeholder="Email">
</div>
<small class="text-muted">Contoh: nama@gmail.com</small>

<label class="mt-2">No Telepon</label>
<div class="input-group-custom">
    <span style="margin-right:8px; color:#888;">+62</span>
    <input type="text" placeholder="No Telepon">
</div>

<label>Password</label>
<div class="input-group-custom">
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png">
    <input type="password" placeholder="Password Min. 8 Karakter">
</div>

<label>NIK</label>
<div class="input-group-custom">
    <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png">
    <input type="text" placeholder="Nomor Induk Kependudukan (NIK)">
</div>


<label>Nama</label>
<div class="input-group-custom">
    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
    <input type="text" placeholder="Nama">
</div>


<div class="gender-wrapper">
    <div class="gender-box">
        <input type="radio" name="gender"> Tuan
    </div>
    <div class="gender-box">
        <input type="radio" name="gender"> Nyonya
    </div>
    <div class="gender-box">
        <input type="radio" name="gender"> Nona
    </div>
</div>

<button class="btn-daftar">Daftar</button>

</form>

<p class="mt-3 text-center" style="font-size:13px;">
Sudah punya akun? <a href="login.html">Login</a>
</p>

</div>

</div>
</div>
</div>

</body>
</html>
