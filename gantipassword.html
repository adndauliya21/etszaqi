<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganti Kata Sandi - RuteKita</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#f3f4f6;
}

.header{
    background:linear-gradient(135deg,#6BB6D9,#4A90E2);
    color:white;
    padding:30px;
    text-align:center;
    border-bottom-left-radius:30px;
    border-bottom-right-radius:30px;
    position:relative;
}

.header i{
    position:absolute;
    left:20px;
    top:30px;
    font-size:20px;
    cursor:pointer;
}

.card-reset{
    background:white;
    border-radius:25px;
    padding:30px;
    margin-top:-30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.form-control{
    border-radius:15px;
    padding:15px;
}

.otp-row{
    display:flex;
    gap:10px;
}

.btn-otp{
    background:#4A90E2;
    color:white;
    border-radius:15px;
    padding:10px 20px;
}

.btn-main{
    border-radius:25px;
    padding:15px;
    border:2px solid black;
    font-weight:600;
}

.title{
    font-size:28px;
    font-weight:600;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="position-fixed top-0 end-0 p-3" style="z-index:9999">

<div id="notifOTP" class="toast align-items-center text-bg-primary border-0">
<div class="d-flex">
<div class="toast-body">
OTP berhasil dikirim ke email
</div>
<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
</div>
</div>

<div id="notifSuccess" class="toast align-items-center text-bg-success border-0 mt-2">
<div class="d-flex">
<div class="toast-body">
Password berhasil diganti
</div>
<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
</div>
</div>

</div>

<div class="header">
<i class="bi bi-arrow-left"></i>
<h5>RUTE KITA</h5>
<div class="title">Ganti Kata Sandi</div>
</div>

<div class="container">

<div class="card-reset">

<div class="text-center mb-3">
<hr style="width:30%; display:inline-block;">
<span class="mx-2 text-muted">Reset Password</span>
<hr style="width:30%; display:inline-block;">
</div>

<p class="text-muted">
Masukkan email yang kamu daftarkan di RuteKita agar kamu dapat menerima kode OTP melalui email
</p>

<label>Email</label>
<div class="input-group mb-2">
<span class="input-group-text"><i class="bi bi-envelope"></i></span>
<input type="email" class="form-control" placeholder="Email">
</div>
<small class="text-muted">Contoh: nama@gmail.com</small>

<label class="mt-3">Kode OTP</label>
<div class="otp-row mb-2">
<input type="text" class="form-control" placeholder="Masukkan kode OTP">
<button class="btn btn-otp" onclick="kirimOTP()">Kirim OTP</button>
</div>

<label>Password</label>
<div class="input-group mb-2">
<span class="input-group-text"><i class="bi bi-lock"></i></span>
<input type="password" class="form-control" placeholder="Password Min. 8 Karakter">
</div>

<label>Konfirmasi Password</label>
<div class="input-group mb-4">
<span class="input-group-text"><i class="bi bi-lock"></i></span>
<input type="password" class="form-control" placeholder="Konfirmasi Password">
</div>

<button class="btn btn-main w-100" onclick="gantiPassword()">
Ganti Kata sandi
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function kirimOTP(){
let toast = new bootstrap.Toast(document.getElementById('notifOTP'));
toast.show();
}

function gantiPassword(){
let toast = new bootstrap.Toast(document.getElementById('notifSuccess'));
toast.show();
}

</script>

</body>
</html>
